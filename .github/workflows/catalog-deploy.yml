# catalog-deploy.yml
#
# Builds the Relay catalog (registry.json) and deploys the static
# catalog/ directory to GitHub Pages on every push to main.
#
# Required secrets / environment variables
# ─────────────────────────────────────────
# No Anthropic API credentials are needed for this workflow — it only
# reads local flow package metadata; it does not execute any flows.
#
# For the GitHub Pages deploy step the workflow uses the standard
# GITHUB_TOKEN (injected automatically by Actions). The token must have
# the "pages: write" and "id-token: write" permissions granted below.
#
# Optional env vars (set as Actions secrets if needed):
#   REGISTRY_EXTRA_PACKAGES  — space-separated list of additional npm
#                              package names to include in the registry
#                              beyond what catalog/flow-list.json lists.
#                              Example: "@ganderbite/flow-api-audit"
#
# Deploy target
# ─────────────
# GitHub Pages. To change the deploy target (Netlify, Vercel, Cloudflare
# Pages, etc.) replace the "Deploy to GitHub Pages" step with the
# provider's Action and set the relevant secrets (e.g. NETLIFY_AUTH_TOKEN,
# NETLIFY_SITE_ID). The output directory is always catalog/ — that does
# not change regardless of host.

name: Catalog deploy

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deploys; cancel in-flight runs when a new push lands.
concurrency:
  group: catalog-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build registry and deploy catalog
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node + pnpm setup ─────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      # ── 3. Install workspace dependencies ────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Build @relay/cli (required by generate-registry.js) ───────────
      - name: Build @relay/cli
        run: pnpm -F @relay/cli build

      # ── 5. Generate registry.json from flow-list.json ────────────────────
      #
      # generate-registry.js reads catalog/flow-list.json, resolves each
      # entry (local path or npm package name), and writes catalog/registry.json.
      #
      # To include additional packages not listed in flow-list.json, set
      # REGISTRY_EXTRA_PACKAGES as an Actions secret (space-separated names).
      - name: Generate registry.json
        run: |
          node packages/cli/bin/generate-registry.js \
            --input catalog/flow-list.json \
            --output catalog/registry.json \
            ${{ env.REGISTRY_EXTRA_PACKAGES != '' && env.REGISTRY_EXTRA_PACKAGES || '' }}
        env:
          REGISTRY_EXTRA_PACKAGES: ${{ secrets.REGISTRY_EXTRA_PACKAGES || '' }}

      # ── 6. Upload catalog/ as a Pages artifact ───────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: catalog/

      # ── 7. Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: pages-deploy
        uses: actions/deploy-pages@v4
