# npm-publish.yml
#
# Publishes @ganderbite/relay-core, @ganderbite/relay, and @ganderbite/relay-generator to npm on every
# push to main that bumps one or more package versions. The step is
# idempotent: packages whose local version already exists on npm are
# silently skipped.
#
# Authentication — Trusted Publishing (no secrets required)
# ──────────────────────────────────────────────────────────
# This workflow uses npm Trusted Publishing (OIDC). No NPM_TOKEN secret is
# needed. Before this workflow can publish, each package must have a Trusted
# Publisher configured on npmjs.com:
#
#   https://www.npmjs.com/package/<pkg-name> -> Settings -> Trusted Publishing
#     Repository owner : ganderbite
#     Repository name  : relay
#     Workflow filename: npm-publish.yml
#
# The id-token: write permission below is required for the OIDC handshake.
# npm >=9.5 is required; the node setup step brings a compatible version.
#
# Partial-publish recovery
# ────────────────────────
# If the workflow fails mid-publish (network error, registry 5xx, etc.),
# re-run it from: Actions -> <this run> -> Re-run all jobs.
# The version guard skips packages already on npm and retries the rest.

name: npm publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Do not cancel in-progress publish runs — a half-published set of packages
# is worse than waiting for the previous run to finish.
concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node + pnpm setup ─────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # ── 3. Install workspace dependencies ────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Build all packages ─────────────────────────────────────────────
      - name: Build
        run: pnpm -r build

      # ── 5. Publish (with version guard) ──────────────────────────────────
      #
      # For each publishable package check whether the local version is
      # already present in the full published version list on npm (including
      # pre-releases). If it is, the package is skipped. This makes the
      # workflow safe to re-run without hitting EPUBLISHCONFLICT.
      - name: Publish packages
        run: |
          set -euo pipefail

          published=""
          skipped=""

          publish_if_new() {
            local pkg_dir="$1"
            local pkg_name
            local local_version

            pkg_name=$(jq -r .name "$pkg_dir/package.json")
            local_version=$(jq -r .version "$pkg_dir/package.json")

            if npm view "$pkg_name" versions --json 2>/dev/null | grep -Fq "\"$local_version\""; then
              echo "  skip  $pkg_name@$local_version (already on npm)"
              skipped="$skipped $pkg_name@$local_version"
            else
              echo "  publish  $pkg_name@$local_version"
              pnpm --filter "$pkg_name" publish --access public --no-git-checks --provenance
              published="$published $pkg_name@$local_version"
            fi
          }

          publish_if_new packages/core
          publish_if_new packages/generator
          publish_if_new packages/cli

          echo ""
          echo "publish summary"
          echo "  published:${published:- (none)}"
          echo "  skipped:${skipped:- (none)}"

          # Expose published list for the release step.
          echo "published=${published}" >> "$GITHUB_OUTPUT"
        id: publish

      # ── 6. GitHub Release (only when something was actually published) ────
      - name: Create GitHub Release
        if: steps.publish.outputs.published != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CLI_VERSION=$(jq -r .version packages/cli/package.json)
          TAG="v${CLI_VERSION}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "  release ${TAG} already exists — skipping"
          else
            gh release create "${TAG}" \
              --title "relay ${CLI_VERSION}" \
              --generate-notes \
              --target main
            echo "  created release ${TAG}"
          fi
